benchmark:
  washout:       500
  chunk_size:    8     # for SAS parallel scan
  vpt_threshold: 0.4
  n_seed:        10
  leak:          1.0  # leaky-integrator rate for ALL SAS models; per-model `leak:` overrides
  # autoregressive stability is handled by clip_output=True (predictions clamped
  # to the [-1, 1] reservoir domain), so no separate prediction clipping needed.

dgps:
  n_train: 5000
  n_test:  1000
  stride:  1000

  mackey_glass:
    loader:  mackey_glass
    label:   "Mackey-Glass"

  mso8:
    loader:  mso8
    label:   "MSO-8"

  logistic_map:
    loader:  logistic_map
    label:   "Logistic Map"

  henon_map:
    loader:   henon_map
    channels: [0, 1]
    label:    "Hénon Map"

  lorenz:
    loader:   lorenz
    channels: [0, 1, 2]
    label:    "Lorenz"
    lyapunov_time_steps: 37

  rossler:
    loader:   rossler
    channels: [0, 1, 2]
    label:    "Rössler"

  multiscroll:
    loader:   multiscroll
    channels: [0, 1, 2]
    label:    "Multiscroll"

  doublescroll:
    loader:   doublescroll
    channels: [0, 1, 2]
    label:    "Doublescroll"

  lorenz96_5:
    loader:   lorenz96
    channels: [0, 1, 2, 3, 4]
    label:    "Lorenz96-5"
    args:
      h: 0.1
      N: 5

models:

  esn:
    type:   esn
    params:
      units: 300
      lr:    0.25
      sr:    1.1
      input_scaling: 1.0
    label:  "ESN"


## v4
  sparse_c3_n200:
    type: sas
    basis_p: {structure: sparse, n: 200, spectral_norm: 0.9, feature: {kind: cheb, degree: 3, cross_input: true}, connectivity: 1.5}
    basis_q: {structure: sparse, n: 200, spectral_norm: 0.9, feature: {kind: cheb, degree: 3, cross_input: true}, connectivity: 1.5}
    label: "Sp-C3 n200"
    color: "#238b45"


  lr_c3_n300_r128:
    type: sas
    basis_p: {structure: lowrank, n: 300, rank: 128, spectral_norm: 0.9, alpha_mode: driver, connectivity: 1.5, feature: {kind: cheb, degree: 5}}
    basis_q: {structure: lowrank, n: 300, rank: 128, spectral_norm: 0.9, alpha_mode: driver, density_G: 0.1, feature: {kind: cheb, degree: 5}}
    label: "LR-C5 r128"
    color: "#762a83"

  lr_t3_n300_r128:
    type: sas
    basis_p: {structure: lowrank, n: 300, rank: 128, spectral_norm: 0.9, alpha_mode: driver, connectivity: 1.5, feature: {kind: trig, degree: 1, bandwidth: 0.5}}
    basis_q: {structure: lowrank, n: 300, rank: 128, spectral_norm: 0.9, alpha_mode: driver, density_G: 0.1, feature: {kind: trig, degree: 3, bandwidth: 0.5}}
    label: "LR-T3 r128"
    color: "#00441b"

